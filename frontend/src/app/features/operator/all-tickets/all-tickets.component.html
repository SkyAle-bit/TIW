<div class="list-container">
  <h2>All Tickets (Operator View)</h2>

  <div class="filters" [formGroup]="filterForm">
    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="">All</mat-option>
        <mat-option *ngFor="let s of statuses" [value]="s">{{s}}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Priority</mat-label>
      <mat-select formControlName="priority">
        <mat-option value="">All</mat-option>
        <mat-option *ngFor="let p of priorities" [value]="p">{{p}}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Category</mat-label>
      <mat-select formControlName="category">
        <mat-option value="">All</mat-option>
        <mat-option *ngFor="let c of categories" [value]="c">{{c}}</mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-button (click)="resetFilters()">Clear Filters</button>
  </div>

  <table mat-table [dataSource]="tickets" class="mat-elevation-z8">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let ticket"> {{ticket.id}} </td>
    </ng-container>

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Title </th>
      <td mat-cell *matCellDef="let ticket">
        <strong>{{ticket.title}}</strong><br>
        <small>by {{ticket.createdBy}}</small>
      </td>
    </ng-container>

    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef> Category </th>
      <td mat-cell *matCellDef="let ticket"> {{ticket.category}} </td>
    </ng-container>

    <!-- Inline editing for Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let ticket">
        <mat-form-field appearance="fill" subscriptSizing="dynamic" class="dense-field">
          <mat-select [value]="ticket.status" (selectionChange)="onStatusChange(ticket.id, $event.value)">
            <mat-option *ngFor="let s of statuses" [value]="s">{{s}}</mat-option>
          </mat-select>
        </mat-form-field>
      </td>
    </ng-container>

    <!-- Inline editing for Priority -->
    <ng-container matColumnDef="priority">
      <th mat-header-cell *matHeaderCellDef> Priority </th>
      <td mat-cell *matCellDef="let ticket">
        <mat-form-field appearance="fill" subscriptSizing="dynamic" class="dense-field">
          <mat-select [value]="ticket.priority" (selectionChange)="onPriorityChange(ticket.id, $event.value)">
            <mat-option *ngFor="let p of priorities" [value]="p">{{p}}</mat-option>
          </mat-select>
        </mat-form-field>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let ticket">
        <button mat-icon-button color="primary" [routerLink]="['/tickets', ticket.id]">
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <div *ngIf="tickets.length === 0" class="no-data">
    <p>No tickets found.</p>
  </div>
</div>
