<div class="dashboard-container">
  <h2>Operator Dashboard</h2>

  <div class="cards-grid">
    <mat-card class="stat-card" *ngFor="let key of keys">
      <mat-card-header>
        <mat-card-subtitle>{{ key }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="stat-number">{{ stats[key] }}</div>
      </mat-card-content>
    </mat-card>

    <div *ngIf="keys.length === 0" class="loading">
      Loading statistics...
    </div>
  </div>
</div>
