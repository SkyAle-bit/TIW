<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Create New Ticket</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input matInput formControlName="title" type="text" placeholder="Brief summary of the issue" />
          <mat-error *ngIf="ticketForm.get('title')?.hasError('required')">
            Title is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Category</mat-label>
          <mat-select formControlName="category">
            <mat-option *ngFor="let cat of categories" [value]="cat">
              {{ cat }}
            </mat-option>
          </mat-select>
          <mat-error *ngIf="ticketForm.get('category')?.hasError('required')">
            Category is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="5" placeholder="Detailed description..."></textarea>
          <mat-error *ngIf="ticketForm.get('description')?.hasError('required')">
            Description is required
          </mat-error>
        </mat-form-field>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <div class="actions">
          <button mat-button type="button" routerLink="/tickets">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="ticketForm.invalid">
            Submit Ticket
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
